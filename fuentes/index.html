<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="author" content="sergio gonzalez garcia" />
    <title>RoboClean Tycoon</title>
    <script defer src="js/create.js"></script>
</head>
<body>

    <header>
        <h1>RoboClean Tycoon</h1>
    </header>

    <main>
        <h2>Configuración del equipo</h2>

        <form id="formulario" action="" method="get">

            <input type="hidden" id="version" name="game_version" value="1.4.2">

            <p>
                <label for="usuario">Usuario:</label>
                <input type="text" id="usuario" name="usuario" required>
            </p>

            <p>
                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" required>
            </p>

            <p>
                <label for="nacimiento">Fecha de nacimiento:</label>
                <input type="date" id="nacimiento" name="nacimiento">
            </p>

            <p>
                <label for="robot">Robot:</label>
                <select id="robot" name="robot">
                    <option value="">-- Selecciona --</option>
                    <option value="r1">WALL-E Mk1</option>
                    <option value="r2">TRASH-X 3000</option>
                </select>
            </p>

            <p>Modo de operación:</p>
            <p>
                <label><input type="radio" name="modo" value="auto"> Automático</label>
                <label><input type="radio" name="modo" value="manual" checked> Manual</label>
                <label><input type="radio" name="modo" value="hibrido"> Híbrido</label>
            </p>

            <p>Mejoras:</p>
            <p>
                <label><input type="checkbox" name="mejoras" value="turbo"> Turbo</label>
                <label><input type="checkbox" name="mejoras" value="capacidad" checked> Contenedor extra</label>
                <label><input type="checkbox" name="mejoras" value="ia"> Módulo IA</label>
                <label><input type="checkbox" name="mejoras" value="solar"> Panel solar</label>
            </p>

            <p>
                <label for="mision">Descripción de la misión:</label><br>
                <textarea id="mision" name="mision"></textarea>
            </p>

            <p>
                <label for="imagen">Imagen del robot:</label>
                <input type="file" id="imagen" name="imagen" accept="image/*">
            </p>

            <p>
                <button type="submit" id="botonInsertar">Insertar</button>
                <button type="reset">Reiniciar</button>
                <a href="https://www.example.com">Ver manual</a>
            </p>

        </form>
        <section id="zona-resultados" style="margin-top: 30px;">
            <h2>Lista de Usuarios</h2>
            <ul id="listaUsuarios"></ul>
        </section>
    </main>
    <footer>
        <details>
            <summary>Más información</summary>
            <p><a href="https://www.policia.es/_es/index.php">Web Personal</a></p>
            <p>Correo: correofalso@gmail.com</p> 
            <p>Número Contacto: 666666666</p>
        </details>
    </footer>

    <script src="js/create.js"></script>
</body>
</html>
